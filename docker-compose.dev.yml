services:
  db:
    image: postgres:17-alpine
    container_name: agent-orchestrator-db-dev
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orchestrator_password}
      POSTGRES_DB: ${POSTGRES_DB:-agent_orchestrator}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-orchestrator} -d ${POSTGRES_DB:-agent_orchestrator}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: agent-orchestrator-api-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_TYPE: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD:-orchestrator_password}@db:5432/${POSTGRES_DB:-agent_orchestrator}
      SERVE_STATIC_UI: 'false'
      CHECK_PENDING_MIGRATIONS_ON_STARTUP: 'false'
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    command: ["npm", "run", "start:dev"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      target: development
    container_name: agent-orchestrator-ui-dev
    environment:
      VITE_DEV_HOST: 0.0.0.0
      VITE_API_PROXY_TARGET: http://api:3000
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      api:
        condition: service_started
    ports:
      - '5173:5173'
    volumes:
      - ./ui:/app/ui
      - ui-node-modules:/app/ui/node_modules

volumes:
  postgres-data-dev:
  api-node-modules:
  ui-node-modules:
