services:
  db:
    image: postgres:17-alpine
    container_name: agent-orchestrator-db-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orchestrator_password}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-agent_orchestrator_test}
    ports:
      - '${POSTGRES_TEST_PORT:-5434}:5432'
    volumes:
      - postgres-data-test:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-orchestrator} -d ${POSTGRES_TEST_DB:-agent_orchestrator_test}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    container_name: agent-orchestrator-api-test
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD:-orchestrator_password}@db:5432/${POSTGRES_TEST_DB:-agent_orchestrator_test}
      SERVE_STATIC_UI: 'false'
      CHECK_PENDING_MIGRATIONS_ON_STARTUP: 'true'
      ALLOWED_ORIGINS: https://localhost,https://agent-orchestrator.localhost
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3001:3000'

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      target: runtime
    container_name: agent-orchestrator-ui-test
    depends_on:
      api:
        condition: service_started
    ports:
      - '8081:80'
      - '8444:443'
    volumes:
      - caddy-data-test:/data
      - caddy-config-test:/config

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    container_name: agent-orchestrator-migrate-test
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_TYPE: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD:-orchestrator_password}@db:5432/${POSTGRES_TEST_DB:-agent_orchestrator_test}
    depends_on:
      db:
        condition: service_healthy
    command: ["dist/cli/index.js", "migrate", "--yes"]

  cli:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    container_name: agent-orchestrator-cli-test
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-orchestrator}:${POSTGRES_PASSWORD:-orchestrator_password}@db:5432/${POSTGRES_TEST_DB:-agent_orchestrator_test}
      SERVE_STATIC_UI: 'false'
    depends_on:
      db:
        condition: service_healthy
    command: ["dist/cli/index.js", "status"]

volumes:
  postgres-data-test:
  caddy-data-test:
  caddy-config-test:
