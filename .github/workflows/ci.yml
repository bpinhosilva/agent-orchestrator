name: CI

on:
  push:
    branches: [ "main", "alpha" ]
  pull_request:
    branches: [ "main", "alpha" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y build-essential python3
        
    - name: Install dependencies
      run: npm ci

    - name: Rebuild native modules
      run: npm rebuild --ignore-scripts=false

    - name: Install UI dependencies
      run: npm ci --prefix ui --legacy-peer-deps
    
    - name: Validate lockfile integrity
      run: npx lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --validate-https

    - name: Verify package signatures
      run: npm audit signatures

    - name: Run npm audit
      run: npm audit --audit-level=high
      
    - name: Run linter
      run: npm run lint:all
      
    - name: Run tests with coverage
      run: npm run test:cov

    - name: Run E2E tests
      run: npm run test:e2e

    - name: Run UI tests
      run: npm test --prefix ui

    - name: Build application
      run: npm run build:all
