name: CI

on:
  push:
    branches: [ "main", "alpha" ]
  pull_request:
    branches: [ "main", "alpha" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js 24.x
      uses: actions/setup-node@v5
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y build-essential python3
        
    - name: Install dependencies
      run: npm ci

    - name: Rebuild native modules
      run: npm rebuild --ignore-scripts=false

    - name: Install UI dependencies
      run: npm ci --prefix ui --legacy-peer-deps
    
    - name: Validate lockfile integrity
      run: npx lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --validate-https

    - name: Verify package signatures
      run: npm audit signatures

    - name: Run npm audit
      run: npm audit --audit-level=high
      
    - name: Run linter
      run: npm run lint:all
      
    - name: Run tests with coverage
      run: npm run test:cov

    - name: Run E2E tests
      run: npm run test:e2e

    - name: Run UI tests
      run: npm test --prefix ui

    - name: Build application
      run: npm run build:all

  release:
    name: Release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild --ignore-scripts=false

      - name: Install UI dependencies
        run: npm ci --prefix ui --legacy-peer-deps

      - name: Build all components
        run: npm run build:all

      - name: Build CLI
        run: npm run cli:build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install --no-save \
            semantic-release@25.0.3 \
            @semantic-release/commit-analyzer@13.0.1 \
            @semantic-release/release-notes-generator@14.1.0 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/npm@13.1.5 \
            @semantic-release/github@12.0.6 \
            @semantic-release/git@10.0.1
          npx semantic-release
